---
layout: default
---

<section class="page-hero reveal">
    <div class="page-hero__copy">
        <p class="eyebrow">{{ page.eyebrow | default: "Strona" }}</p>
        <h1>{{ page.title }}</h1>
        <p class="page-hero__summary">{{ page.summary | default: page.excerpt | strip_html | strip | default: site.description }}</p>
    </div>

    {% if page.hero_link %}
    <div class="page-hero__actions">
        <a class="button button--secondary" href="{{ page.hero_link }}">{{ page.hero_link_label | default: "Otworz" }}</a>
    </div>
    {% endif %}
</section>

<div class="page-content reveal">
    {{ content }}
</div>
