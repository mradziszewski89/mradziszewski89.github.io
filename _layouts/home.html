---
layout: default
---

{{ content }}

<h2>📢 Najnowsze artykuły</h2>

{% if site.posts.size > 0 %}
<ul>
{% for post in site.posts %}
  <li>
    <a href="{{ post.url | relative_url }}">{{ post.title }}</a><br>
    <small>{{ post.date | date: "%Y-%m-%d" }}</small>
  </li>
{% endfor %}
</ul>
{% else %}
<p>Brak opublikowanych artykułów.</p>
{% endif %}
